name: Deploy morelidev.com

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          PORT="${{ secrets.DEPLOY_PORT }}"
          PORT="${PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          PORT="${DEPLOY_PORT:-22}"

          # Injeta o JWT_SECRET no servidor como variável de ambiente
          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" "echo 'JWT_SECRET=${JWT_SECRET}' > /opt/morelidev/.env"

          ssh -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'ENDSSH'
            set -e
            cd /opt/morelidev

            git fetch --all
            git reset --hard origin/main

            # Garante que a rede Traefik existe
            docker network create legalreports_public 2>/dev/null || true

            docker compose -p morelidev -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "Deploy concluído."
          ENDSSH
